<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIT_STACK - Manage Questions Pool</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- API Config -->
    <script src="api.js?v=2"></script>
</head>
<body class="bg-slate-50 dark:bg-[#0a0f1e] text-slate-900 dark:text-white font-sans overflow-hidden">
    <div class="flex h-screen">

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-slate-900 dark:bg-[#0d1117] border-r border-slate-800/60 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="h-16 flex items-center justify-between px-5 border-b border-slate-800/60">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                        <i data-lucide="shield-check" class="w-4 h-4 text-white"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-white text-sm leading-none">OIT_STACK</h1>
                        <p class="text-[10px] text-slate-500 font-medium mt-0.5">Admin Portal</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 py-3 px-3 overflow-y-auto space-y-0.5">
                <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200 group">
                    <i data-lucide="home" class="w-4 h-4 shrink-0 text-slate-500 group-hover:text-slate-300"></i> Home
                </a>
                <a href="admin-dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0"></i> Dashboard
                </a>
                <a href="admin-students.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="users" class="w-4 h-4 shrink-0"></i> Students
                </a>
                <a href="admin-categories.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="folder-tree" class="w-4 h-4 shrink-0"></i> Categories
                </a>
                <a href="admin-questions.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium bg-indigo-500/15 text-indigo-400 border border-indigo-500/20">
                    <i data-lucide="database" class="w-4 h-4 shrink-0 text-indigo-400"></i> Question Pool
                </a>
                <a href="admin-tests.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="file-text" class="w-4 h-4 shrink-0"></i> Tests
                </a>
                <a href="admin-coding.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="code" class="w-4 h-4 shrink-0"></i> Coding Challenges
                </a>
                <a href="admin-interviews.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="mic" class="w-4 h-4 shrink-0"></i> Mock Interviews
                </a>
                <a href="admin-results.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="award" class="w-4 h-4 shrink-0"></i> Results
                </a>
                <a href="admin-notifications.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="bell" class="w-4 h-4 shrink-0"></i> Broadcasts
                </a>
                <a href="admin-analytics.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="bar-chart-3" class="w-4 h-4 shrink-0"></i> Analytics
                </a>
            </nav>
            <div class="p-3 border-t border-slate-800/60">
                <button onclick="logout()" class="w-full flex items-center justify-center gap-2 p-2.5 rounded-xl bg-slate-800/50 hover:bg-slate-800 border border-slate-700/40 text-slate-400 hover:text-rose-400 transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span class="text-sm font-medium">Logout</span>
                </button>
            </div>
        </aside>

        <!-- Overlay for mobile sidebar -->
        <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 hidden lg:hidden cursor-pointer"></div>

        <!-- Main Content -->
        <div class="flex-1 lg:ml-64 flex flex-col min-w-0 h-full">
            <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-800/60 flex items-center justify-between px-4 lg:px-6 shrink-0 z-20">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800">
                        <i data-lucide="menu" class="w-5 h-5 text-slate-600 dark:text-slate-400"></i>
                    </button>
                    <h2 class="font-bold text-lg hidden sm:block">Questions Pool</h2>
                </div>
                <div class="flex items-center gap-2">
                    <a href="/" class="text-sm font-bold text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white transition-colors mr-2">Home</a>
                    <button onclick="toggleTheme()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                        <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 lg:p-6 bg-slate-50/50 dark:bg-[#0a0f1e]/50">
                <div class="max-w-6xl mx-auto flex flex-col gap-6 pb-12">
                    
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div>
                            <h1 class="text-2xl font-black text-slate-800 dark:text-white">Questions Pool</h1>
                            <p class="text-xs font-bold text-slate-400 mt-1" id="qCount">Loading questions...</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="window.location.href='admin-bulk-import.html'" class="px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 font-bold text-xs hover:bg-slate-50 dark:hover:bg-slate-800 transition-all flex items-center gap-2">
                                <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> Bulk CSV Import
                            </button>
                            <button onclick="window.location.href='admin-question-create.html'" class="px-4 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs shadow-md shadow-indigo-500/20 transition-all flex items-center gap-2">
                                <i data-lucide="plus-circle" class="w-4 h-4"></i> Add Question
                            </button>
                        </div>
                    </div>

                    <!-- Filters -->
                    <div class="p-4 bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl flex flex-col md:flex-row items-center justify-between gap-4 shadow-sm">
                        <div class="relative w-full md:flex-1">
                            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="searchInput" placeholder="Search questions..." class="w-full pl-9 pr-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-slate-900 dark:text-white">
                        </div>
                        <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                            <select id="typeFilter" class="w-full sm:w-40 px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-xs font-bold focus:outline-none focus:border-indigo-500" onchange="filterCategories()">
                                <option value="">All Formats</option>
                                <option value="aptitude">Aptitude (Logic/Math)</option>
                                <option value="technical">Technical (MCQ)</option>
                            </select>
                            <select id="catFilter" class="w-full sm:w-48 px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-xs font-bold focus:outline-none focus:border-indigo-500">
                                <option value="">All Categories</option>
                            </select>
                            <select id="diffFilter" class="w-full sm:w-36 px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-xs font-bold focus:outline-none focus:border-indigo-500">
                                <option value="">All Difficulties</option>
                                <option value="easy">Easy</option>
                                <option value="medium">Medium</option>
                                <option value="hard">Hard</option>
                            </select>
                        </div>
                    </div>

                    <div id="loader" class="flex justify-center py-12">
                        <div class="animate-spin h-8 w-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div>
                    </div>

                    <!-- Main Table -->
                    <div id="tableContainer" class="hidden w-full overflow-x-auto rounded-3xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-slate-50 dark:bg-slate-800/40 border-b border-slate-100 dark:border-slate-800 text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider text-xs">
                                    <th class="px-6 py-4 w-[45%]">Question Text</th>
                                    <th class="px-6 py-4">Category</th>
                                    <th class="px-6 py-4">Type</th>
                                    <th class="px-6 py-4">Difficulty</th>
                                    <th class="px-6 py-4">Marks</th>
                                    <th class="px-6 py-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-slate-100 dark:divide-slate-800/60 font-semibold text-slate-700 dark:text-slate-200">
                                <!-- Dynamic JS Injection -->
                            </tbody>
                        </table>
                        <div id="emptyState" class="hidden py-12 flex-col items-center justify-center text-center">
                            <i data-lucide="alert-circle" class="w-12 h-12 text-slate-300 mb-3"></i>
                            <p class="text-slate-500 text-sm">No questions match filters.</p>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed top-4 right-4 z-50 p-4 rounded-xl text-sm font-semibold shadow-lg border"></div>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        function logout() {
            api.removeToken();
            window.location.href = 'login.html';
        }

        let allQuestions = [];
        let categories = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const token = api.getToken();
            if(!token) { window.location.href='login.html'; return; }
            
            try {
                // Fetch Categories
                const catRes = await api.request('/categories');
                categories = catRes.data || [];
                filterCategories();

                await fetchQuestions();
                
                document.getElementById('searchInput').addEventListener('input', applyFilters);
                document.getElementById('typeFilter').addEventListener('change', applyFilters);
                document.getElementById('catFilter').addEventListener('change', applyFilters);
                document.getElementById('diffFilter').addEventListener('change', applyFilters);

            } catch(e) {
                console.error(e);
            }
        });

        function filterCategories() {
            const typeVal = document.getElementById('typeFilter').value;
            const catFilter = document.getElementById('catFilter');
            catFilter.innerHTML = '<option value="">All Categories</option>';
            
            const filteredCats = categories.filter(c => !typeVal || c.type === typeVal);
            filteredCats.forEach(c => {
                catFilter.innerHTML += `<option value="${c._id}">${c.name}</option>`;
            });
        }

        async function fetchQuestions() {
            document.getElementById('loader')?.classList.remove('hidden');
            document.getElementById('tableContainer')?.classList.add('hidden');
            try {
                // Fetch only active questions
                const res = await api.request('/questions?limit=1000');
                allQuestions = (res.data.questions || []).filter(q => q.isActive !== false);
                applyFilters();
            } catch(e) {
                console.error(e);
            } finally {
                document.getElementById('loader')?.classList.add('hidden');
                document.getElementById('tableContainer')?.classList.remove('hidden');
            }
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('typeFilter').value;
            const cat = document.getElementById('catFilter').value;
            const diff = document.getElementById('diffFilter').value;

            const filtered = allQuestions.filter(q => {
                let match = true;
                if(search && !q.question.toLowerCase().includes(search)) match = false;
                if(type && q.category?.type !== type) match = false;
                if(cat && q.category?._id !== cat) match = false;
                if(diff && q.difficulty !== diff) match = false;
                return match;
            });

            document.getElementById('qCount').textContent = `${filtered.length} questions configured`;
            
            const tbody = document.getElementById('tableBody');
            const empty = document.getElementById('emptyState');

            if(filtered.length === 0) {
                tbody.innerHTML = '';
                empty.classList.remove('hidden');
                empty.classList.add('flex');
            } else {
                empty.classList.add('hidden');
                empty.classList.remove('flex');
                tbody.innerHTML = filtered.map(q => {
                    let diffBadge = '';
                    if(q.difficulty==='easy') diffBadge='bg-emerald-100 text-emerald-600 dark:bg-emerald-500/20 dark:text-emerald-400';
                    if(q.difficulty==='medium') diffBadge='bg-amber-100 text-amber-600 dark:bg-amber-500/20 dark:text-amber-400';
                    if(q.difficulty==='hard') diffBadge='bg-rose-100 text-rose-600 dark:bg-rose-500/20 dark:text-rose-400';

                    let typeBadge = q.category?.type === 'technical'
                        ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-500/10 dark:text-indigo-400'
                        : 'bg-blue-100 text-blue-700 dark:bg-blue-500/10 dark:text-blue-400';

                    return `
                    <tr class="hover:bg-slate-50/50 dark:hover:bg-slate-800/20 transition-all font-medium text-slate-700 dark:text-slate-300">
                        <td class="px-6 py-4">
                            <p class="text-xs font-bold text-slate-800 dark:text-white truncate max-w-[320px]" title="${q.question.replace(/"/g, '&quot;')}">${q.question}</p>
                        </td>
                        <td class="px-6 py-4 text-xs">
                            ${q.category?.name || 'Uncategorized'}
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase ${typeBadge}">${q.category?.type || 'Aptitude'}</span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase ${diffBadge}">${q.difficulty}</span>
                        </td>
                        <td class="px-6 py-4 text-xs font-bold">
                            ${q.marks} marks
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="window.location.href='admin-question-create.html?id=${q._id}'" class="p-1.5 rounded-lg border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors inline-block mr-1">
                                <i data-lucide="edit-2" class="w-4 h-4 text-slate-500"></i>
                            </button>
                            <button onclick="deleteQuestion('${q._id}')" class="p-1.5 rounded-lg border border-rose-200 dark:border-rose-900/50 hover:bg-rose-50 dark:hover:bg-rose-900/20 transition-colors inline-block">
                                <i data-lucide="trash-2" class="w-4 h-4 text-rose-500"></i>
                            </button>
                        </td>
                    </tr>
                    `
                }).join('');
                lucide.createIcons();
            }
        }

        async function deleteQuestion(id) {
            if(confirm('Are you sure you want to soft-delete this question?')) {
                try {
                    await api.request(`/questions/${id}`, { method: 'DELETE' });
                    fetchQuestions();
                } catch(e) {
                    alert(e.message);
                }
            }
        }
    </script>
</body>
</html>
