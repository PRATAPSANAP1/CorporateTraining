<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIT_STACK - Manage Announcements</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- API Config -->
    <script src="api.js?v=2"></script>
</head>
<body class="bg-slate-50 dark:bg-[#0a0f1e] text-slate-900 dark:text-white font-sans overflow-hidden">
    
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-slate-900 dark:bg-[#0d1117] border-r border-slate-800/60 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="h-16 flex items-center justify-between px-5 border-b border-slate-800/60">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                        <i data-lucide="shield-check" class="w-4 h-4 text-white"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-white text-sm leading-none">OIT_STACK</h1>
                        <p class="text-[10px] text-slate-500 font-medium mt-0.5">Admin Portal</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 py-3 px-3 overflow-y-auto space-y-0.5">
                <a href="admin-dashboard.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0"></i> Dashboard
                </a>
                <a href="admin-students.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="users" class="w-4 h-4 shrink-0"></i> Students
                </a>
                <a href="admin-categories.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="folder-tree" class="w-4 h-4 shrink-0"></i> Categories
                </a>
                <a href="admin-questions.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="database" class="w-4 h-4 shrink-0"></i> Question Pool
                </a>
                <a href="admin-bulk-import.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="upload-cloud" class="w-4 h-4 shrink-0"></i> Bulk CSV Import
                </a>
                <a href="admin-notifications.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium bg-indigo-500/15 text-indigo-400 border border-indigo-500/20 group">
                    <i data-lucide="bell" class="w-4 h-4 shrink-0 text-indigo-400"></i> Send Announcements
                    <span class="ml-auto w-1.5 h-1.5 rounded-full bg-indigo-400"></span>
                </a>
                <a href="admin-tests.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="file-text" class="w-4 h-4 shrink-0"></i> Tests
                </a>
                <a href="admin-coding.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="code" class="w-4 h-4 shrink-0"></i> Coding Challenges
                </a>
                <a href="admin-interviews.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="mic" class="w-4 h-4 shrink-0"></i> Mock Interviews
                </a>
                <a href="admin-results.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="award" class="w-4 h-4 shrink-0"></i> Results
                </a>
                <a href="admin-analytics.html" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800/60 hover:text-slate-200">
                    <i data-lucide="bar-chart-3" class="w-4 h-4 shrink-0"></i> Analytics
                </a>
            </nav>
            <div class="p-3 border-t border-slate-800/60">
                <button onclick="logout()" class="w-full flex items-center justify-center gap-2 p-2.5 rounded-xl bg-slate-800/50 hover:bg-slate-800 border border-slate-700/40 text-slate-400 hover:text-rose-400 transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span class="text-sm font-medium">Logout</span>
                </button>
            </div>
        </aside>

        <!-- Overlay for mobile sidebar -->
        <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 hidden lg:hidden"></div>

        <!-- Main Content -->
        <div class="flex-1 lg:ml-64 flex flex-col min-w-0 h-full">
            <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-800/60 flex items-center justify-between px-4 lg:px-6 shrink-0 z-20">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800">
                        <i data-lucide="menu" class="w-5 h-5 text-slate-600 dark:text-slate-400"></i>
                    </button>
                    <h2 class="font-extrabold text-lg flex items-center gap-2">
                        <i data-lucide="bell" class="w-5 h-5 text-indigo-500"></i> Send Announcements
                    </h2>
                </div>
                <div class="flex items-center gap-2">
                    <a href="/" class="text-sm font-bold text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white transition-colors mr-2">Home</a>
                    <button onclick="toggleTheme()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                        <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 lg:p-6 bg-slate-50/50 dark:bg-[#0a0f1e]/50">
                <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6 pb-12 items-stretch">
                    <!-- Toast -->
                    <div id="toast" class="hidden fixed top-4 right-4 z-50 p-4 rounded-xl text-sm font-semibold shadow-lg border"></div>

                    <!-- Left: Create Announcement Form -->
                    <div class="lg:col-span-1 p-6 bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-2xl shadow-sm h-fit space-y-5">
                        <h3 class="font-bold text-base">New Announcement</h3>
                        
                        <form id="announcementForm" class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase mb-1.5">Announcement Title</label>
                                <input type="text" id="title" required placeholder="e.g. Test Deadline Announcement" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase mb-1.5">Description/Message</label>
                                <textarea id="message" rows="4" required placeholder="Describe the announcement details..." class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20"></textarea>
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase mb-1.5">Severity Level</label>
                                <select id="type" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                                    <option value="info">Info (Blue)</option>
                                    <option value="warning">Warning (Amber)</option>
                                    <option value="success">Success (Emerald)</option>
                                </select>
                            </div>

                            <button type="submit" id="btnPublish" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold shadow-lg shadow-indigo-500/10 flex items-center justify-center gap-1.5 transition-colors">
                                <i data-lucide="send" class="w-4 h-4"></i> <span id="publishText">Publish Announcement</span>
                                <div id="publishSpinner" class="hidden animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div>
                            </button>
                        </form>
                    </div>

                    <!-- Right: Previous Announcements List -->
                    <div class="lg:col-span-2 p-6 bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-2xl shadow-sm flex flex-col gap-4">
                        <div class="flex justify-between items-center pb-3 border-b border-slate-100 dark:border-slate-800">
                            <h3 class="font-bold text-base">Active Broadcast History</h3>
                            <span id="announcementCount" class="px-2.5 py-0.5 rounded-full text-xs font-bold bg-slate-100 dark:bg-slate-800">0</span>
                        </div>

                        <div id="loaderList" class="flex justify-center items-center py-12">
                            <div class="animate-spin h-8 w-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div>
                        </div>

                        <div id="emptyList" class="hidden py-16 text-center text-slate-400 text-sm">
                            <i data-lucide="info" class="w-10 h-10 mx-auto mb-2 text-slate-300"></i>
                            No active announcements broadcasted yet.
                        </div>

                        <div id="announcementsList" class="hidden flex flex-col gap-4 overflow-y-auto max-h-[500px] pr-1">
                            <!-- Announcements list items -->
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function logout() {
            api.removeToken();
            window.location.href = 'login.html';
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed top-4 right-4 z-50 p-4 rounded-xl text-sm font-semibold shadow-lg border ${
                type === 'success' 
                ? 'bg-white dark:bg-slate-900 text-slate-900 dark:text-white border-slate-200 dark:border-slate-800' 
                : 'bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 border-red-200 dark:border-red-800'
            }`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 4000);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const token = api.getToken();
            if (!token) { window.location.href = 'login.html'; return; }

            await fetchAnnouncements();
        });

        async function fetchAnnouncements() {
            const listEl = document.getElementById('announcementsList');
            const loader = document.getElementById('loaderList');
            const empty = document.getElementById('emptyList');

            try {
                const res = await api.request('/announcements');
                const list = res.data || [];
                
                document.getElementById('announcementCount').textContent = list.length;

                loader.classList.add('hidden');
                
                if(list.length > 0) {
                    empty.classList.add('hidden');
                    listEl.classList.remove('hidden');
                    
                    listEl.innerHTML = list.map(item => {
                        let severityClass = 'bg-blue-50 border-blue-200 text-blue-600 dark:bg-blue-500/10 dark:border-blue-900/30 dark:text-blue-400';
                        if(item.type === 'warning') severityClass = 'bg-amber-50 border-amber-200 text-amber-600 dark:bg-amber-500/10 dark:border-amber-900/30 dark:text-amber-400';
                        if(item.type === 'success') severityClass = 'bg-emerald-50 border-emerald-200 text-emerald-600 dark:bg-emerald-500/10 dark:border-emerald-900/30 dark:text-emerald-400';

                        return `
                            <div class="p-4 border rounded-2xl flex gap-4 ${severityClass} hover:-translate-y-0.5 transition-transform relative">
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-extrabold text-sm uppercase tracking-wider">${item.title}</h4>
                                    <p class="text-xs mt-1.5 opacity-90 leading-relaxed whitespace-pre-wrap">${item.message}</p>
                                    <div class="flex items-center gap-2 mt-3 text-[10px] opacity-70 font-semibold">
                                        <span>By ${item.createdBy?.name || 'Administrator'}</span>
                                        <span>•</span>
                                        <span>${new Date(item.createdAt).toLocaleString()}</span>
                                    </div>
                                </div>
                                <button onclick="deleteAnnouncement('${item._id}')" class="p-1 rounded-lg hover:bg-black/10 dark:hover:bg-white/10 shrink-0 self-start text-slate-400 hover:text-rose-500 transition-colors">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        `;
                    }).join('');
                    lucide.createIcons();
                } else {
                    listEl.classList.add('hidden');
                    empty.classList.remove('hidden');
                }
            } catch(e) {
                showToast(e.message || 'Error loading announcements', 'error');
            }
        }

        document.getElementById('announcementForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value;
            const message = document.getElementById('message').value;
            const type = document.getElementById('type').value;

            const btn = document.getElementById('btnPublish');
            const text = document.getElementById('publishText');
            const spinner = document.getElementById('publishSpinner');

            btn.disabled = true;
            text.classList.add('hidden');
            spinner.classList.remove('hidden');

            try {
                await api.request('/announcements', {
                    method: 'POST',
                    body: JSON.stringify({ title, message, type })
                });

                showToast('Announcement broadcasted successfully! 🎉');
                document.getElementById('title').value = '';
                document.getElementById('message').value = '';
                
                await fetchAnnouncements();
            } catch(err) {
                showToast(err.message || 'Error broadcasting announcement', 'error');
            } finally {
                btn.disabled = false;
                text.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        });

        async function deleteAnnouncement(id) {
            if(!confirm('Are you sure you want to delete this announcement?')) return;

            try {
                await api.request(`/announcements/${id}`, { method: 'DELETE' });
                showToast('Announcement deleted successfully.');
                await fetchAnnouncements();
            } catch(err) {
                showToast(err.message || 'Error deleting announcement', 'error');
            }
        }
    </script>
</body>
</html>
